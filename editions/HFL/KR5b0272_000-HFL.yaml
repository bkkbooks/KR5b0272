front:
  text: 上清北極天心正法四七夫天心法者自太上降鶴鳴山日授天師指東北極之書辟斥邪魔救民是務昔之流傳天心正法止有三符一乃天罡大聖符二曰黒煞符三名三光符若論三光符者上結三皇道應三境德表三才眞出三師是名天心爲萬道之宗衆法之祖虚靜先生云有兩印一係北極驅邪院印又名都天統攝三界鬼神之印二係都天大法主印簡而不繁留付竒人留傳于世
