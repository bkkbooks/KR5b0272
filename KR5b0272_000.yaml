巳也此天罡之宫與天罡所建宫則司建同運氣二者用之各有輕重當其進養非宮莫定當其用非氣不行遍在太虛莫非光學者不可不知若向為對拘執又恐非劉先生曰凡方所向在心之向凡戒無戒在心之戒所謂左顧取太陽右顧取太隂逐月建而取罡精真得之要妙假若乘舟誤有海瀆魚龍出入風雨旋轉不知東西南北之所欲向罡取氣何以知之心未定法亦不從心既定寂然神光迅格當在左掌為天地四指十二文為宫分所向南約時歷訣迎日氣對仰首便取惟見大赤天中罡垂火氣如絲灌下口中內外洞明倘不知父母師尊之所在奚暇論四方故曰凡方無向也其法不可不刻指其行不可不知或云上半月用亥下半月用戍從月建上數起至未時而住假令正月上半月午時以亥加寅上數到酉得午便見天罡在戍此法出紫微七政經世人罕得而知所知者則有年月天罡之法甚有差別不知活曜之訣大有靈驗格云且如天罡主大法之師諸式之首順之者生逆之者死凡人却以月將天罡加戍加亥非也又或將月將加正時亦非也諸法官須當識天罡真相則存思請氣而不誤矣天罡是如隂人狀如玉女服色等詳載三光律內豈不聞北斗呪曰北斗靈靈斗柄前星又曰天罡所指晝夜常輪既逐斗柄之前何緣加戍加亥此皆天雖不語而垂象於人人自不悟天之道也不識天罡位如何行持矣然一論之中所見不同今既類以成集俱是同門而異户歎夫獨學無友孤陋寡聞之說可見矣今觀此格數句之內意有兼明真足為吾道之指迷應欲施為並宜順之此法或隨寓旅舍路途行船之時不及𡵯斗即丁罡面向而為之矣其活矅常要定時正而加地干月建神靈以次移轉一神其罡每年周而復始若行應心效口可以倒山嶽破邪廟皆在指掌之內反覆之間也經云天罡所指百邪無逃遁之形子細行用永無慮矣凡事但從天罡上去前三辰為鸞後三辰為引無不吉利此法若非聖人相傳於世後人莫得而知吉人得之非夙緣寶難遭際授此天機之妙㫖袐而藏之寶而愼之父子不傳千金不昜輕泄則減算折祿殃及九祖風刀立至萬劫不原受持之士全在志誠靡不順聽袐之天罡救治法凡欲取罡先須定日月時罡之所指即迎而取之謂知罡指寅即步向寅反面申取之罡步起貪至破即存星在足前以剔起罡仰首視天罡滿口取氣久步入斗口用之凡步罡勿橫行天罡也如獨橫罡皆成斷文道大禁此二字脫巾叩頭而謝之步罡日一月凡七日初一初五初九十五二十二十五二十九若行事可用日中時無人處吉不得令人見見則天精不降也罡氣法左手斗印右手劒訣步三元罡呪曰天罡大聖北斗靈君吾行正法枷縛汝身吾奉大帝敕北斗助吾力天罡捉妖氣急降真氣至急急如律令又呪曰乾元亨利貞日月助吾兵靈氣入五臟六腑得安寧玉皇大帝敕天罡大聖敕四聖真君默念明天帝四玉皇大聖攝天罡方所法以本月加取氣之時順數尋辰在何位即天罡所指之方取罡氣之法當面天罡指方存天罡大聖在已身前披髮跣足著素羅衣身長百丈居立左手又腰右手仗劒指前頂出青白氣中有火色赤氣細如絲次存天罡面赤色回顧已身然後取氣先誦呪左轉仰背吸之活曜歌月月常加酉天罡照後宫月月常加亥前宫屬對衝月月常加戍河魁當面逢時三一徑裏背水向天罡嗣漢虛靜天師指迷歌罡在西方面在東兊取罡氣已還同一吸天罡如雲雨再吸天罡萬丈紅呵筆上納心中行神遣將有英雄若能識得天罡法治病驅邪立見功起例寅申罡加子卯酉掐加寅辰戍龍頭上巳亥馬宫親子午居猴位丑未犬宫輪活曜天罡月將氣候訣正月天罡加在寅但將諸位見元辰若將月月常加戌管得時時見破軍此取罡日五日辰時春分二月是常言二至三移四滿邊三六七中同二至秋分小雪六方邊雨水大寒前一日八朝霜降候無偏雨水一日亥時交登明春分二日戍時交河魁穀雨三日酉時交從魁小滿五日辰時交傳送夏至四日未時交小吉大暑四日午時交勝先處暑四日已時交太一秋分六日辰時交天罡霜降八日卯時交太衝小雪六日亥時交功曹冬至四日丑時交大吉大寒一日子時交神后天心三光總論凡取三光之光芒付符者謂太陽太隂天罡且太陽十二時行一度五日行兩宫今取日月之氣者多以此推謂日月臨虛危則望寶瓶宫子取氣臨星張望師子宫午取氣曽不知他處有方天運不息況天有三百六十五度一半出地繞下其日月行舍雖經緯躔度孰知黃赤二道分度豈辨南北往來又取罡氣如何罡戍天罡順時定辰以月將加時推其罡建向望之取自謂曲盡其妙且如分燭者必以二薪向空吸之可乎惟太陽十六字呪太隂二十四字呪極妙不可輕泄又轉羅魁𩲃𩵄䰢魓𩳐魒七字能召天罡之氣引類太虛正如方燧之取水火能知此道則坐致明霞於沖氣之中又何必歷算存思於制度之外也哉吁三光之奧由未善也格云三光符乃吞符第一道能驅一切邪氣蠱氣厭氣治一切邪病破毒病斬鬼胎斷尸勞除瘟疫及諸痛不可忍者及十八種竒疾誤食毒藥蠱毒己上符到即愈其呼吸後學之士但知符名而巳不知三光真名者一也不識天罡者二也念天罡呪不全而紕繆者三也不識加臨者四也不知氣之所降者五也不曽受三符者六也不得三光即者七也不知隱祕符竅者八也不知書符之時者九也此乃九件未知三光符即無驗矣格云如行三光合受三光籙為職即令鬼神欽伏若法與籙相違背則為社廟鬼神所笑行持無功凡服三氣竟於每日欲進氣時惟平坐安定無以雜慮干心或於每夜子時披衣靜坐握固思神叩齒咽津液三口須㬰存肝中太陽氣如日肺中太隂氣如月心中罡氣如橘彈丸俱出至黃庭宫混合為一下入丹田想入下關自夾脊𩀱關歷中關撞入泥丸宫自明堂入玉池以舌拄上腭乘接真氣咽之存入丹田藏之形若彈丸色同朱橘凡行住坐卧念念常思丹田中真氣光明燦燦存畢叩齒三通咽液三過以左右手互換搓八十一遍訖乃睡夫進氣時候早午晚三時或只早晚一次日與夜同進畢即封七户七户者即口鼻耳眼也封法兩手各握天丁印先以左手印封口鼻眼兩手各封左右耳畢旋身出斗訣日月星是天上三竒在人則神氣精服天上三竒以輔我身中三竒服氣後常閉口鼻中綿綿氣息往來微細不吹動毫毛存三光圎如彈九在下丹田忌食五辛三厭諸血穢之物不犯房事不違此則為地仙書符呪水治鬼御神萬邪摧伏喪晴破膽不敢近也此氣乃萬法祖宗行之九年夜坐室中不看澄燭而目覩光明終身行之其氣與天上三竒合體而飛騰矣又貴在焚香靜定而有常也然精神內運當導引若如此法式運用則萬病不能侵矣三田反復金液還丹訣序此即三光中用肺為華蓋咽喉為重樓口為玉池眉為玉堂額為天庭鼻為天柱頂為天宫耳為𩀱市門腎氣傳肝肝氣傳心心氣傳脾脾氣傳肺下田入上田上田又入中田中田入下田三田反復號曰三光丹亦曰大還丹五氣朝元三光錬形之圖東青西白南赤北黑神像也三光過關圖上關天府宫此法又號水火既濟本法用寅卯時平坐偃身一撞三關閕息良久覺水火降升要舉動導引默運心氣上升役使天罡法呪曰謹請天罡大神速降真靈上朝金闕下覆昆崘手持寶劒搜斬邪精行神布氣去病滅疼或呪果子呪水治病不可輕泄妄傳非人普施三光符水一凡有邪祟妖怪染著不能通言解醒念天罡呪入水取罡氣吸水噀其面令病者服符及三光煞鬼符燒入水中吞一凡有瘟疫日服正氣漸以安寧一凡有赤眼閉明以變神掐斗訣午文亦得次掐上帝訣入斗印取三光吹筆書符取氣呪水符浸水中令病人洗眼仍用斗訣向正喝一聲疾發符念呪唵嚩𠯐唎㖡㗶吒爾是李公仲緣何來我家一念每一喝即喝之付水與洗仍向日取火氣呵之一凡有頭疼不可忍者當書三光符貼太陽穴一凡有瘧鬼作梗者書三光符於餅上令食之書符呪曰汝是形如黑憂鬼吾知汝姓名速速去千里不得稍留停復取三光氣噴之以三光符與吞一凡有生産經日未下十死一生者書三光符吞服存三光大聖立前次存雷電火車煞鬼吏兵同監生大神等存捧符人為符吏齎持符命前去以立待雷電火車監生大神隨符入産人口中立即生下一凡有鬼精作凶怪以壓害生人以三光煞鬼符貼門上如著人身及六畜呪水噀之一凡有瘡久疼以三光符燒灰貼之或以符覆之或吞之或未破者默念天罡呪七遍取氣七過吹之自然消潰一凡渡江涉海有水怪繞船作害不去妄有求取而作驚恐者取天罡正氣於鐵劄上書三光符擲水中一凡有百病未安皆以三光符服之隨病用湯吞下應邪氣加煞鬼符用東南方桃枝七寸煎湯下或呪水皆可或燒符在盞內服之收罡水法罡者隂中自然之火破滅萬邪凡收罡水乃藏威而待之凡遇重午日大雨時於華蓋方正子二午三卯四酉五復子下置水器收之若無雨即於午時取井華水收之謂之罡水又法以天德月德日每月丑日若婆羅門下降日巳上是也遇天雨時亦於華蓋方收之謂之法水皆祭而後用和合三光丹法每一蒸餅去皮并底用心中無所聚也分作二片乾一片用水浸爛一片兩片隂陽也一處兩槎搜令極黏膩不計遍數念呪取氣噓之仍先想左手為日右手為月口噓氣為罡捍作餅子翻覆遍寫三光符在上不計遍數畢隨大小丸之每一粒各存三光氣呪一遍格云若依此法但將蒸餅吹之七七遍其色如丹久而難白其靈尤妙細丸之與人吞服曰三光丹若書符投井中五更初投符時井水俱沸試之即知神驗矣存想真人形配衣式凡伏哀問祟行持先存頂上一座斗以斗口𦋇身罡在前出履一斗垂罡在下而兩斗乘之左右挾輔各一斗並以肘貪狼肩巨問心為祿存所握手處為文曲左手即落右腰右手即落左腰為廉貞為武曲足前為破軍罡光交煥師在火光中上有斗𦋇下有斗乘也飛斗左手子午挑出左邊右手寅午斗挑在後左為陽斗云貪狼存想黑星光自右足下發繞左邊直上𦋇頭頂上出存紅星紅光自左足發繞右手邊直上𦋇頭頭頂上出右手子午斗挑出左邊又寅午斗挑出右邊右為隂斗魁至魒次辰戍斗蓋頭又以三台重蓋在上三台斗呪上台虛精已保我千齡中台六淳午䘙我身形下台曲生未拜謁三清上清北極天心正法
