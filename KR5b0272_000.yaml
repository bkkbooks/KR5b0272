body:
  text: 法官入患家存變法凡入患家丁罡九自身存為元始王南方九鳳吐真火燒燬患宅皆灰揚震風一吹皆清淨化為樓殿金華堂人物皆化天仙子樓殿下有九鰲翔戴起樓臺俱紫霧金光萬道迸扶桑四面俱為大海水波濤湧沸無四方洪浪萬頃無舟楫我方入去運天罡化身元始領甲兵玄中正一侍吾身四聖三官并將吏六甲六丁齊降臨青龍白虎井朱雀玄武麒麟師鳳翔雷電交轟俱前入我身五斗挾藏魂天罡赤氣前開道鐵網交加上下繒十面八方皆兵將旗幟幢幡列萬兵叩齒集神運三氣誦呪煞鬼自然靈變巨海訣掐亥勒上甲至四三二指甲下挑出化為巨海渺渺茫茫洪波萬頃宅四畔皆為大海次虛皇臺訣大指掐丑勒上至午挑出化居屋為神仙官闕十二步丁罡噀水三口喝變三聲閉目存己身宅為十二樓臺骨肉盡化為神仙玉女左上遊宴下有巨鰲乘載往來海水深無定次掐舟楫訣大指掐寅順轉至亥挑出存海無舟楫鬼神無路次四方發連天障訣右手仰左手覆右手二指甲掐左手二指根左手大指掐右手三指從右手四指背過恰中指中掐四指上節五指掐左手五指甲背曲直右手二指存纎障亘天連地隔斷邪祟無路而入若法師出乘黑雲度海化鐵障前開後合乃二足並立前開後合淨壇呪天上地下大力天丁輔助吾法掃蕩妖氛穢氣速滅蕩滌妖氛壇場速淨道氣長存急急如律令左手煞文取天門氣入水灑淨淨身呪上真玄靈五斗覆身神清氣爽蕩穢安寧急急如太上律令左手藥又印訣取天門氣吹之淨心呪五氣正靈乾象變化翊衛輔佐心神無差急急如太上律令左手天心訣從三指掐掌心變形呪三天之令化吾之形青龍白虎侍衛我身邪鬼逺遁真氣速生急急如太上律令左手天心訣右手斗印想身如天師狀藏魂入斗呪吾受天師心寶印佩受自然通幽逹冥上徹洞天吾行禹步願得升仙三魂童子左手三台訣取三光氣存三台居左謂之三魂七魄真人右手北斗訣第三指炎吸七口氣有七星居右謂之七魄隨吾禹步願度靈關急急如律令步豁落斗夏至後先右足冬至後先左足陽日斗要妙兮十二辰隂日日月明乾坤配河圖藏神九宫斗戴九履一左三右七二四為肩六八為足五居其中以為實腹千邪萬鬼悉皆賔伏急急如律令天心召將呪左魁右罡六甲靈神速召正將急速降臨上帝有敕遵依奉行急急如律令右手斗印天門氣召將隨意用書符存思訣先淨心母雜想坐建方向破上存三清虛空仰領四聖萬兵將存我身驅邪相五斗光藏形狀前踏罡後踼煬我身明三光降吸入口無差妄太陽火自卯降太隂水自酉降天罡星自中降紫白赤三色樣𦋇我身萬邪唱叩齒九四大暢三田光我身壯方書符為法藏天心總呪混溟涬中文海渥泩明丑煥輝炳焰寅煒煌㶺烗卯青帝㑹神卯白帝居酉酉赤帝養氣午黑帝通血子黃帝中主中一五三變左三匝散之萬殊回丑風寅合卯靈辰寂巳寞午感未通申惟真酉惟應戍惡逆亥敢萌子淨治丑而治中以法召神以神召氣午凝之自然中指掐大指甲下周流天地午天心有命午萬神敬聽中文一羅斬煞中上二貪狼敕中一三計都攝中文唵唎利娑訶所召某將疾速前來發中指下訣急急如玉清詔召萬神律今敕天心法部將吏服色姓諱都夫執邪大將張廷中披髮大紅袍金甲仗劔橫天殺神大將朱子真彼髮青袍金甲執索衝天攝神大將蘇成力披髮黃袍金甲持劔金天火輪神將鄭天英披髮皂袍金甲持杖飛空金聖大將趙天正披髮白袍金甲執枷炎空飛輪大將王火光披髮緋袍金甲持火輪飛霄滅邪大將劉次神披髮紫袍金甲握刀丹青聖神大將胡中元披髮袍金甲執杖安神定魂大將居子鎮披髮緋袍金甲伏劔追魂歸魂大將杜剛志披髮青袍金甲執刀禁法神通大將姚堯真披髮緑袍金甲伏劔追魈捉魅大將許天信披髮黃花袍金甲持刀跳山入海大將袁通靈披髮青袍金甲伏劔右大將一十三真並屬北院北極天心丞相府北極正法丞相府天心正法印篆正篆漢篆雲篆都天大法主印天罡大聖敕煞鬼真符按道書云天罡大聖為國禳災日月失度彗星晝出旱潦蟲蝗瘟疫流熾凶惡神鬼入境出見醜惡怪形入人宅舍拋甎擲瓦使風放火迷惑生人即書天罡真形符存見破軍正照如法預先一日於夜備置香花酒果供養天罡大聖并露筆墨於按上至曉可屏除外念清淨身心依法書符天字式玉清上帝上清大帝太清大帝玉皇上帝罡字式天罡大聖北斗尊星誅斬凶惡滅跡除形魔王畏懼膽碎心傾敕民疾苦大賜威靈治病去禍回死作生天符到處斷絶妖精降臨真氣聖威奉行大字式玄武使者大威靈收捉凶惡碎滅其形收魂附體七魂安寧護身除病永保長生衆神凜凜聖字式乾元亨利貞邪不干正六甲六丁天丁力士五雷使者風伯兩師執符而行敕字式玉清上帝上清大帝太清大帝四門天王五部火輪王都法主金木水火土五星尊神六甲六丁七元尊神左輔右弼星八火金剛九天元君十方護法神君玉皇上帝敕煞字式上清北極大帝天蓬大元帥三十六貟大將未文天卯地官中水官四指中天煞神君辰地煞神君中水煞神君四指上年煞神君寅月煞神君日煞神君時煞神君亥合形書符念天罡呪敕存上天節度破魔尊星真氣人符掐罡目凡鎮宅驅邪大有應驗或付符噀水握劔訣云天靈地靈三五交并吾奉帝敕紏察邪精直日功曹承行將吏不得稽停速去速來吾當坐待攝次運雷局天雷隱隱子地雷隂雷陽雷雷威驚動龍虎交橫日月羅列寅照耀分明卯十二功曹辰五雷使者六甲六丁執符而行午挑急急如律令一轉六神藏寅至卯二轉四煞沒辰三轉動魁罡午四轉雷火騰子五轉霹靂發酉六轉山鬼滅戌七轉收攝一切逆天無道截足之鬼某身上為禍邪祟赴吾魁罡五雷之下受死無動無作急急如律令呪訣掐雷局運雷時以訣自腎官攪起腎水上騰心火赤氣下交賢氣二氣混合激成當電運轉須用兩手雷局引上頂門出以訣掩耳作雷聲閃目三次為電鼻出氣為風口吐氣為雲噀水三口為雨送符發訣去變請符水人為天丁力士或本日功曹如催生為催生童子監生大神所將符之人路中不可停歇古本三光符書符先坐建方向破出官擲子午斗覆身如法請氣入朱墨硯中存光芒滿硯呪曰太陽正照隂鬼當衰神朱明日九露太微三氣成台七氣成斗二星俱照符到必追墨為神劔筆為戈㦸硯為龍池水為龍津筆法治病萬邪俱滅一如律令次掐日君訣左手中指上節圎景方象方形圎影符念日呪存日中紫氣九芒吹入符中桃訣念月呪存月中白氣十芒吹入符中桃訣七轉念魁至魒掐辰取罡氣入符合形畢念天罡大聖降臨正真氣收入鬼心五火三光符天帝釋章佩帶天罡五方凶惡之鬼何不消亡飛仙一吸萬鬼伏藏天火地火雷火霹靂火洞淵三昧真火日宫七煞月宫七煞天罡大聖玉清上帝上清大帝太清大帝天官帝君地官帝君水官帝君角亢至翼軫勑唵吽吽衆神稽首邪魔歸正敢有凶惡化作微塵急急禀敕奉行合形本師訣敕符呪天之符靈地之符靈六甲六丁攝衆邪精符到奉行萬病皆治急急如律令又符天帝釋章佩帶天罡五方凶惡之鬼何不消亡飛仙一吸某萬鬼伏藏開閉留塞穿破六訣天火亥地火巳雷火卯霹靂火申三味真火本今訣一轉天地動二轉日月明三轉三將軍四轉四聖入淵海五轉五雷鳴六轉六丁衛七轉七星佐八轉八方攝天雷中央洞淵火斗訣一火一彈午上出入日月呪一轉六神藏二轉敕魁罡三轉三將軍四轉四煞沒五轉五雷鳴六轉六丁衛七轉七真氣魁至治萬病煞文三光氣右符取南方火氣五口吹入泠病治氣塊瘟疫服之發汗為驗亦可燒熏身上為妙五火三光符上台一黃去却不祥中台二白護身鎮宅午下台三青治病除精未台星到處大賜靈誅凶惡滅跡除形天符到處上帝敕下聖威奉行急急如玉清上帝敕天帝釋章呪急急至岐唵日呪卯唵月呪酉唵罡呪辰五火右書符畢罡呪敕天帝澤章呪又日魂月魄二呪敕差將發去雷局取氣入水大三光符上台中台下台唵吽吽玉清聖境上清太清太上吳天開至破日呪月呪罡呪煞天煞黑煞真形符開至破貪魁天罡止太衝敕天蓬都元帥手執上帝敕收捉天下鬼神天猷副元帥手執寶劔斬斷天下妖精天圓地方六律九章冠帶九氣結為衣裳頂冠朱雀陽四左轉日官太陽帝君隂日右轉月府太隂皇君二十八宿星君煞加真武呪敕合形夫行持之道莫先於取氣蓋氣正而符靈將正而法驗未有不知氣路而行持者也是法門衆多未嘗確論取氣之方天心正法以三光為宗南方靈文以朱陵為本不說朱陵方呪夫諸家靈文但只載某方取氣而不指其源夫後學傳職之士謬誤百端乃符水不應欲怨大道殊不得傳而然也深可憫之今具于後能深造之不亦宜乎上清部服飛根赤精金丹上法每日服時見太陽論臨目小開面向日叩齒九通心中隂祝呼日魂之名日中五帝之字每手相接呼之日魂五帝依五方坐日在其中日魂精魂日中赤氣上皇真君諱將軍字髙騫不可輒呼存而知之朱景日魂照韜青帝圓常無字照韜形似嬰兒水青玉錦帔蒼華飛羽裙建翠容扶晨冠從日中乘光而來立吾身左緑映赤帝丹靈峙字緑紅映形如嬰兒衣絳王錦帔白羽飛華裙建丹扶靈冠從日光芒來立吾身右回霞白帝皓鬱將字回金霞形如嬰兒素衣白玉錦帔白羽飛華裙建皓靈扶華冠從日光中來立于吾前赤童日魄玄炎黑帝澄潧停字玄緑炎形如嬰兒衣黑玉錦帔黑羽飛華裙建玄山扶蓉冠從日光中來立吾左手上飈象黃帝壽逸阜字飈輝形如前衣黃玉錦帔黃羽飛華裙建扶桑素冠從日光中來立吾右手上右法凡呼召畢暝目依俙見日光握固垂手存見日中五色浮霞之氣其霞芒左青右赤上白下黑中黃五色之中氣含氣映皆接來一身自兩足至頂頸流霞五色俱入口中流霞初從日中來見五色混合日光通遍頭足也又存光霞之中後有赤氣大如童目者纍垂數十約煥五色之中存有四十五枚名曰飛根水母心存呼之三遍與五色氣來入口中開口吸引覺滿口向日吞霞四十五咽每一吸流霞并一飛根同入吞之九吞入肝九吞入肺九吞入心九吞入腎九吞入脾仍存一身內外臟臍一同光芒霞光洞徹良久畢又咽液九遍叩齒九通微呪曰赤爐丹氣玄天育精剛以受柔炎火隂英曰晨元景號曰大明九陽齊化二象俱生凝魂和魄五氣之精中生五帝乘光御形採飛以靈掇根得盈首中龍和披朱帶青轡烏流玄霞映上清賜書玉柬金闕刻名服食朝華與真道合靈飛仙太微上升紫庭急急如律令呪畢向日再拜天隂無日可於室中所卧處潔淨存而行之清修之士精通上感豈待見日修持自然成功見日猶妙太微服日氣開明靈符右月晦早向東燒香朱書青紙上細書之其㸃畫宜象本文後符亦效此東向吞之以告日魂也凡服符不可預書臨時書畢即服臨符閉氣左手執符呪曰太微丹書名曰開明致日上魂來化某形平日嚴粧發自玄玄庭飛華水日根金精紫映流光號曰五靈呪畢服符以左手捲符成凡吞下存入心中上清部吞月華石鏡水母上法夕夕服之見論須叩齒十遍心中隂呼月魄名月中五帝夫人之字次存五帝夫人在月中依五色坐乘光芒而來立于左右前後兩手月魄精神月中黃氣上皇神母諱曜道友字玉薈條不可輒呼靉蕭月魄芳豔青帝娥隱珠字芬形如嬰兒青華綾錦帔翠龍鳳文飛裙頭上作頽雲三角髻餘髮垂至腰翳寥婉虛赤帝夫人翳逸寥字婉延虛形如前衣丹藥王錦帔朱華鳳絡飛裙頭如